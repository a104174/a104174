<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGradient" x1="0" y1="0" x2="900" y2="0">
      <stop offset="0%" stop-color="#111111" stop-opacity="0"/>
      <stop offset="50%" stop-color="#111111" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <style>
      .panel {
        fill: #ffffff;
        stroke: #e5e5e5;
        stroke-width: 1;
        filter: url(#softShadow);
      }

      .title {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 18px;
        font-weight: 700;
        fill: #111111;
      }

      .text {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 14px;
        fill: #555555;
      }

      .muted {
        fill: #888888;
      }

      .cursor {
        animation: blink 1s infinite;
      }

      .flow {
        stroke: url(#lineGradient);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 160 740;
        animation: moveLine 4s ease-in-out infinite;
      }

      .node {
        fill: #111111;
        animation: pulse 2.4s ease-in-out infinite;
      }

      .node:nth-of-type(2) {
        animation-delay: .4s;
      }

      .node:nth-of-type(3) {
        animation-delay: .8s;
      }

      .bar {
        fill: #111111;
        opacity: .85;
        transform-origin: bottom;
        animation: grow 2.8s ease-in-out infinite;
      }

      .bar2 {
        animation-delay: .3s;
      }

      .bar3 {
        animation-delay: .6s;
      }

      .bar4 {
        animation-delay: .9s;
      }

      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }

      @keyframes moveLine {
        0% { stroke-dashoffset: 900; opacity: .2; }
        45% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: .2; }
      }

      @keyframes pulse {
        0%, 100% { opacity: .35; r: 4; }
        50% { opacity: 1; r: 6; }
      }

      @keyframes grow {
        0%, 100% { transform: scaleY(.45); opacity: .45; }
        50% { transform: scaleY(1); opacity: .9; }
      }
    </style>
  </defs>

  <rect x="30" y="30" width="840" height="200" rx="24" class="panel"/>

  <circle cx="62" cy="62" r="5" fill="#ff5f57"/>
  <circle cx="82" cy="62" r="5" fill="#ffbd2e"/>
  <circle cx="102" cy="62" r="5" fill="#28c840"/>

  <text x="62" y="105" class="title">heldercruz.engineering</text>
  <text x="62" y="135" class="text">
    Building clean interfaces, reliable systems and useful software
    <tspan class="cursor">_</tspan>
  </text>

  <rect x="62" y="160" width="126" height="30" rx="15" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="82" y="180" class="text">Next.js</text>

  <rect x="202" y="160" width="112" height="30" rx="15" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="222" y="180" class="text">Node.js</text>

  <rect x="328" y="160" width="132" height="30" rx="15" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="348" y="180" class="text">PostgreSQL</text>

  <line x1="530" y1="105" x2="800" y2="105" class="flow"/>
  <circle cx="560" cy="105" r="4" class="node"/>
  <circle cx="665" cy="105" r="4" class="node"/>
  <circle cx="770" cy="105" r="4" class="node"/>

  <rect x="560" y="150" width="14" height="42" rx="4" class="bar"/>
  <rect x="590" y="130" width="14" height="62" rx="4" class="bar bar2"/>
  <rect x="620" y="142" width="14" height="50" rx="4" class="bar bar3"/>
  <rect x="650" y="118" width="14" height="74" rx="4" class="bar bar4"/>

  <text x="700" y="165" class="text muted">systems</text>
  <text x="700" y="187" class="text muted">that scale</text>
</svg>
